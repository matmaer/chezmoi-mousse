name: Lint (ruff + pylint + black)
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  linting:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13", "3.14"]
    steps:
    - uses: actions/checkout@v4
    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}
    - name: Run ruff
      run: uv run ruff check src/
    - name: Run black
      run: uv run black --check src/
    - name: Verify app can be imported
      run: uv run python -c "import chezmoi_mousse; print('Import successful')"
      env:
        PYTHONPATH: src
