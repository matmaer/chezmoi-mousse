---
repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.9
    hooks:
      - id: uv-lock

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace

  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        args: [--in-place, --recursive, --wrap-summaries=88, --wrap-descriptions=88]
        files: ^src/

  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: v1.10.0
    hooks:
      - id: python-check-blanket-noqa
      - id: python-check-blanket-type-ignore
      - id: text-unicode-replacement-char
      - id: python-use-type-annotations

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        files: ^src/
        args: ["--toml", "pyproject.toml"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-ast
      - id: check-case-conflict
      - id: check-docstring-first
      - id: check-illegal-windows-names
      - id: check-toml
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key

  # When running with --fix, Ruff's lint hook should be placed BEFORE Black
  # as Ruff's fix behavior can output code changes that require reformatting.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        types_or: [ python, pyi ]
        args: [ --fix ]

  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.0
    hooks:
      - id: black
        name: black
        args: [--skip-magic-trailing-comma]
        description: "Black: The uncompromising Python code formatter"
        entry: black
        language: python
        minimum_pre_commit_version: 2.9.2
        require_serial: true
        types_or: [python, pyi]

  - repo: local
    hooks:
      - id: pytest-local
        name: pytest-local
        description: pytest static and smoke tests
        entry: |
          sh -c '
          GIT_DIR=$(git rev-parse --git-dir 2>/dev/null)
          if [ -d "$GIT_DIR/rebase-merge" ] || [ -d "$GIT_DIR/rebase-apply" ]; then
            echo "Skipping pytest-local hook during rebase.";
            exit 0;
          fi;
          env PYTHONPATH=src pytest tests/static_tests && pytest tests/smoke_tests
          '
        language: python
        additional_dependencies:
          - pytest
          - pytest-asyncio
          - pytest-env
          - pytest-timeout
          - textual[syntax]
          - faker
          - tomlkit
          - psutil
        pass_filenames: false
        types: [python]

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.10.9
    hooks:
      - id: uv-export
